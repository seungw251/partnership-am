/* ── Icons ─────────────────────────────────────────────────────────── */

/* ── Constants ───────────────────────────────────────────────────────────── */
const today   = new Date();
const fmt     = d => d.toISOString().split('T')[0];
const addDays = (b,n) => { const d=new Date(b); d.setDate(d.getDate()+n); return d; };
const diffDays= (a,b) => Math.round((new Date(a)-new Date(b))/(864e5));
// 색을 어둡게(f<0)/밝게(f>0) — |f|=0~1
const shade = (hex,f) => {
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  const t=f<0?0:255, p=Math.abs(f);
  r=Math.round((t-r)*p+r); g=Math.round((t-g)*p+g); b=Math.round((t-b)*p+b);
  return '#'+(0x1000000+r*0x10000+g*0x100+b).toString(16).slice(1);
};
// 경과일수(시작~오늘)가 클수록 더 진하게 — 14일에 최대 진하기
const ageShade = elapsed => -Math.min(1,Math.max(0,elapsed)/14)*0.45;
const DAYS_KO = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Get Monday of the week
const getMonday = (base, weekOff=0) => {
  const d = new Date(base);
  d.setHours(0,0,0,0);
  const dow = d.getDay(); // 0=Sun
  const diff = dow===0 ? -6 : 1-dow;
  d.setDate(d.getDate() + diff + weekOff*7);
  return d;
};

const INIT_PROJ = [

   start:fmt(addDays(today,-3)),end:fmt(addDays(today,5)),
   hist:[{id:1,by:'Toya',at:'2026-06-17 09:00',text:'Initial design done'},{id:2,by:'delistation',at:'2026-06-18 14:30',text:'API spec shared'}]},

   hist:[{id:1,by:'koyama',at:'2026-06-10 09:00',text:'Work started'},{id:2,by:'Xkitchen',at:'2026-06-13 14:00',text:'Mid review done'},{id:3,by:'koyama',at:'2026-06-15 17:00',text:'Migration complete'}]},
  {id:102,storeId:'18563',partner:'wannaeats',assignee:'fukataki',catId:8,start:'2026-06-05',doneAt:'2026-06-10',memo:'Landing page design',
   hist:[{id:1,by:'fukataki',at:'2026-06-05 10:00',text:'Draft started'},{id:2,by:'wannaeats',at:'2026-06-08 11:00',text:'Feedback shared'},{id:3,by:'fukataki',at:'2026-06-10 16:00',text:'Final design confirmed'}]},

   hist:[{id:1,by:'noah',at:'2026-06-03 09:30',text:'Data collection started'},{id:2,by:'noah',at:'2026-06-08 15:00',text:'Analysis report done'}]},
];

const ST = {
  awaiting: {label:'Awaiting response',color:'#F59E0B',bg:'#FEF3C7',dark:'#D97706',text:'#78350F'},
  review:   {label:'Internal review',  color:'#3B82F6',bg:'#DBEAFE',dark:'#2563EB',text:'#1E3A8A'},
  absent:   {label:'Absent',           color:'#EF4444',bg:'#FEE2E2',dark:'#DC2626',text:'#7F1D1D'},
  nocontact:{label:'No contact yet',   color:'#94A3B8',bg:'#F1F5F9',dark:'#64748B',text:'#334155'},
};
// Ongoing sub-status order
const ONGOING_STATUSES = ['awaiting','review','absent','nocontact'];

/* ── App ─────────────────────────────────────────────────────────────── */
function App() {
  useEffect(()=>{ document.getElementById('loading').style.display='none'; },[]);

  const [col,      setCol]      = useState(false);
  const [view,     setView]     = useState('dash');
  const [projs,    setProjs]    = useState(INIT_PROJ);
  const [done,     setDone]     = useState(INIT_DONE);
  const [cats,     setCats]     = useState(INIT_CATS);
  const [partners, setPartners] = useState(INIT_PARTNERS);
  const [assignees,setAssignees]= useState(INIT_ASSIGNEES);
  const [sel,      setSel]      = useState(null);
  const [modal,    setModal]    = useState(false);
  const [weekOff,  setWeekOff]  = useState(0);
  const [perfPeriod,setPerfPeriod]= useState('all');
  const [perfMode,  setPerfMode]  = useState('assignee');
  const [fA,     setFA]     = useState('');
  const [fP,     setFP]     = useState('');
  const [eCat,   setECat]   = useState(null); const [nCat,setNCat]=useState('');
  const [ePart,  setEPart]  = useState(null); const [nPart,setNPart]=useState('');
  const [eAsgn,  setEAsgn]  = useState(null); const [nAsgn,setNAsgn]=useState('');
  const [msg,    setMsg]    = useState('');
  const [selDone,setSelDone]= useState(null);
  const [doneFA, setDoneFA] = useState('');
  const [doneFP, setDoneFP] = useState('');
  const [doneMsg,    setDoneMsg]    = useState('');
  const [doneGroupMode, setDoneGroupMode] = useState('assignee');
  const [doneMonthOff,  setDoneMonthOff]  = useState(0);
  const [resF, setResF] = useState({assignee:'',partner:'',catId:'',storeId:'',memo:'',start:'',resolved:'',days:''});
  const [resScope, setResScope] = useState('total');
  const [resRange, setResRange] = useState({from:'',to:''});
  const [colW, setColW] = useState([130,150,200,150,320,120,160,80]);
  const [completeDate,setCompleteDate]= useState(fmt(today));
  const doneHistRef = useRef(null);
  const initForm = () => ({storeId:'',partner:partners[0]?.name||'',assignee:assignees[0]?.name||'',catId:cats[0]?.id??1,start:fmt(today),end:'',memo:''});
  const [form,   setForm]   = useState(initForm);
  const histRef = useRef(null);

  /* This week Mon-Sun (7 days) */
  const weekDates = useMemo(()=>{
    const mon = getMonday(today, weekOff);
    return Array.from({length:7},(_,i)=>{
      const d = addDays(mon, i);
      return {
        key:fmt(d),
        label: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        day: DAYS_KO[d.getDay()],
        isToday: fmt(d)===fmt(today),
        isSun: d.getDay()===0,
        isSat: d.getDay()===6,
      };
    });
  },[weekOff]);

  /* Filtered project list */
  const filtered = useMemo(()=>
    projs.filter(p=>(!fA||p.assignee===fA)&&(!fP||p.partner===fP))
  ,[projs,fA,fP]);

  /* Rows grouped by assignee */
  const ganttRows = useMemo(()=>{
    const order=[], map={};
    filtered.forEach(p=>{
      if(!map[p.assignee]){map[p.assignee]=[];order.push(p.assignee);}
      map[p.assignee].push(p);
    });
    const rows=[];
    order.forEach(a=>{
      rows.push({type:'grp',assignee:a,cnt:map[a].length});
      map[a].forEach(p=>rows.push({type:'proj',p}));
    });
    return rows;
  },[filtered]);

  const weekLabel = useMemo(()=>{
    const mon = getMonday(today,weekOff);
    const sun = addDays(mon,6);
    return `${mon.toLocaleDateString('en-US',{month:'long',day:'numeric'})} – ${sun.toLocaleDateString('en-US',{month:'long',day:'numeric'})}`;
  },[weekOff]);

  const perfAll = useMemo(()=>{
    const all=[
      ...projs.map(p=>({...p,_done:false})),
      ...done.map(p=>({...p,_done:true})),
    ];
    if(perfPeriod==='week'){
      const mon=fmt(getMonday(today,0));
      const sun=fmt(addDays(getMonday(today,0),6));
      return all.filter(p=>{const d=p._done?p.doneAt:p.start;return d>=mon&&d<=sun;});
    }
    if(perfPeriod==='month'){
      const m=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
      return all.filter(p=>{const d=p._done?p.doneAt:p.start;return d.startsWith(m);});
    }
    return all;
  },[projs,done,perfPeriod]);

  const stats = useMemo(()=>cats.map(c=>({
    ...c,
    act: projs.filter(p=>p.catId===c.id).length,
    done:done.filter(p=>p.catId===c.id).length,
  })),[cats,projs,done]);

  /* Data 화면: 범위/스코프/컬럼필터로 거른 행 목록 (테이블 + 엑셀추출 공용) */
  const dataRows = useMemo(()=>{
    const norm=s=>String(s||'').toLowerCase();
    const anyRange=resRange.from||resRange.to;
    const inRange=d=>{ if(!d)return false; if(resRange.from&&d<resRange.from)return false; if(resRange.to&&d>resRange.to)return false; return true; };
    const daysOf=p=>p._resolved
      ? (p.start&&p.doneAt?Math.max(0,Math.round((new Date(p.doneAt)-new Date(p.start))/86400000)):'')
      : (p.start?Math.max(0,Math.round((new Date(fmt(today))-new Date(p.start))/86400000)):'');
    let pool=[];
    if(resScope==='total'||resScope==='ongoing') pool=pool.concat(projs.filter(p=>!anyRange||inRange(p.start)).map(p=>({...p,_resolved:false})));
    if(resScope==='total'||resScope==='resolved') pool=pool.concat(done.filter(p=>!anyRange||inRange(p.doneAt)).map(p=>({...p,_resolved:true})));
    return pool.filter(p=>{
      if(resF.assignee&&p.assignee!==resF.assignee)return false;
      if(resF.partner&&p.partner!==resF.partner)return false;
      if(resF.catId&&String(p.catId)!==String(resF.catId))return false;
      if(resF.storeId&&!norm(p.storeId).includes(norm(resF.storeId)))return false;
      if(resF.memo&&!norm(p.memo).includes(norm(resF.memo)))return false;
      if(resF.start&&!norm(p.start).includes(norm(resF.start)))return false;
      if(resF.resolved&&!norm(p.doneAt).includes(norm(resF.resolved)))return false;
      if(resF.days&&!String(daysOf(p)).includes(resF.days.trim()))return false;
      return true;
    }).map(p=>({...p,_days:daysOf(p)}));
  },[projs,done,resScope,resRange,resF]);

  const catBy   = id => cats.find(c=>c.id===id);
  const liveSel = sel ? projs.find(p=>p.id===sel.id) : null;
  /* Multi store-ID support */
  const sidArr   = p => Array.isArray(p.storeIds)?p.storeIds:(p.storeId?String(p.storeId).split(',').map(s=>s.trim()).filter(Boolean):[]);
  const storeMain= p => { const a=sidArr(p); return a.length>1?`${a[0]} +${a.length-1}`:(a[0]||'-'); };
  const storeAll = p => sidArr(p).join(', ');

  /* Actions */
  const addProj = () => {
    if(!form.storeId.trim()||!form.partner||!form.assignee) return;
    const ids=form.storeId.split(',').map(s=>s.trim()).filter(Boolean);
    setProjs(v=>[...v,{...form,storeId:ids.join(', '),storeIds:ids,id:Date.now(),status:'nocontact',hist:[],catId:Number(form.catId)}]);
    setModal(false);
    setForm(initForm());
  };
  const complete = (id, doneAt) => {
    const p=projs.find(x=>x.id===id); if(!p) return;
    setDone(v=>[...v,{...p,doneAt:doneAt||fmt(today)}]);
    setProjs(v=>v.filter(x=>x.id!==id));
    if(sel?.id===id) setSel(null);
  };
  const send = () => {
    if(!msg.trim()||!sel) return;
    const e={id:Date.now(),by:'Me',at:new Date().toLocaleString('en-US'),text:msg};
    setProjs(v=>v.map(p=>p.id===sel.id?{...p,hist:[...p.hist,e]}:p));
    setSel(v=>({...v,hist:[...v.hist,e]}));
    setMsg('');
    setTimeout(()=>histRef.current?.scrollTo({top:99999,behavior:'smooth'}),50);
  };
  const setStatus = (id, status) => {
    setProjs(v=>v.map(p=>p.id===id?{...p,status}:p));
  };
  const delHist = (pid, hid) => {

    const cols=['Assignee','Partner','Category','Store ID','Memo','Start','Resolved','Status','Days'];

        p._resolved?'Resolved':(ST[p.status]?ST[p.status].label:''),
        p._days!==''?p._days:''

    });
    const csv=String.fromCharCode(0xFEFF)+lines.join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);

              <div style={{...card,padding:24}}>
                <div style={{display:'flex',alignItems:'center',gap:8,fontWeight:700,color:'#1E293B',marginBottom:20,fontSize:15}}>
                  <IcUsers size={18} style={{color:'#8B5CF6'}}/>Partner Management
                </div>
                <div style={{display:'flex',gap:10,marginBottom:18}}>
                  <input value={nPart} onChange={e=>setNPart(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&addPart()}
                    placeholder="Partner name" style={{flex:1,border:'1px solid #E2E8F0',borderRadius:10,padding:'11px 14px',fontSize:14,outline:'none'}}/>
                  <button onClick={addPart} style={{padding:'11px 20px',borderRadius:10,background:'#8B5CF6',color:'white',border:'none',fontWeight:600,fontSize:14,cursor:'pointer',boxShadow:'0 4px 12px -2px rgba(139,92,246,.4)'}}>Add</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {partners.map(p=>(
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:10,border:'1px solid #F1F5F9',background:'#FAFBFC'}}>
                      <span style={{width:10,height:10,borderRadius:'50%',background:'#8B5CF6',flexShrink:0}}/>
                      {ePart===p.id
                        ?<input defaultValue={p.name} autoFocus
                            onBlur={e=>updPart(p.id,e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter')updPart(p.id,e.target.value);if(e.key==='Escape')setEPart(null);}}
                            style={{flex:1,border:'1px solid #8B5CF6',borderRadius:6,padding:'4px 8px',fontSize:13}}/>
                        :<span style={{flex:1,fontWeight:600,fontSize:14,color:'#334155'}}>{p.name}</span>
                      }
                      <div style={{display:'flex',gap:2,flexShrink:0}}>
                        <button onClick={()=>setEPart(p.id)} style={{padding:6,borderRadius:6,border:'none',background:'none',color:'#94A3B8',cursor:'pointer',display:'flex'}}><IcEdit size={13}/></button>
                        <button onClick={()=>delPart(p.id)} style={{padding:6,borderRadius:6,border:'none',background:'none',color:'#94A3B8',cursor:'pointer',display:'flex'}}><IcTrash size={13}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              {/* Assignee management */}
              <div style={{...card,padding:24}}>
                <div style={{display:'flex',alignItems:'center',gap:8,fontWeight:700,color:'#1E293B',marginBottom:20,fontSize:15}}>
                  <IcUsers size={18} style={{color:'#F59E0B'}}/>Assignee Management
                </div>
                <div style={{display:'flex',gap:10,marginBottom:18}}>
                  <input value={nAsgn} onChange={e=>setNAsgn(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&addAsgn()}
                    placeholder="Assignee name" style={{flex:1,border:'1px solid #E2E8F0',borderRadius:10,padding:'11px 14px',fontSize:14,outline:'none'}}/>
                  <button onClick={addAsgn} style={{padding:'11px 20px',borderRadius:10,background:'#F59E0B',color:'white',border:'none',fontWeight:600,fontSize:14,cursor:'pointer',boxShadow:'0 4px 12px -2px rgba(245,158,11,.4)'}}>Add</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {assignees.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:10,border:'1px solid #F1F5F9',background:'#FAFBFC'}}>
                      <span style={{width:10,height:10,borderRadius:'50%',background:'#F59E0B',flexShrink:0}}/>
                      {eAsgn===a.id
                        ?<input defaultValue={a.name} autoFocus
                            onBlur={e=>updAsgn(a.id,e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter')updAsgn(a.id,e.target.value);if(e.key==='Escape')setEAsgn(null);}}
                            style={{flex:1,border:'1px solid #F59E0B',borderRadius:6,padding:'4px 8px',fontSize:13}}/>
                        :<span style={{flex:1,fontWeight:600,fontSize:14,color:'#334155'}}>{a.name}</span>
                      }
                      <div style={{display:'flex',gap:2,flexShrink:0}}>
                        <button onClick={()=>setEAsgn(a.id)} style={{padding:6,borderRadius:6,border:'none',background:'none',color:'#94A3B8',cursor:'pointer',display:'flex'}}><IcEdit size={13}/></button>
                        <button onClick={()=>delAsgn(a.id)} style={{padding:6,borderRadius:6,border:'none',background:'none',color:'#94A3B8',cursor:'pointer',display:'flex'}}><IcTrash size={13}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              {/* Resolved history */}
              <div style={{...card,padding:0,overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid #F1F5F9'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,fontWeight:700,color:'#1E293B',fontSize:15}}>
                    <IcArchive size={18} style={{color:'#10B981'}}/>Resolved History
                    <span style={{fontSize:12,fontWeight:500,color:'#94A3B8',background:'#F1F5F9',borderRadius:999,padding:'2px 8px'}}>{done.length}</span>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <select value={doneFA} onChange={e=>setDoneFA(e.target.value)}
                      style={{fontSize:12,border:'1px solid #E2E8F0',borderRadius:8,padding:'5px 9px',background:'white',color:'#475569',cursor:'pointer'}}>
                      <option value="">All assignees</option>
                      {assignees.map(a=><option key={a.id}>{a.name}</option>)}
                    </select>
                    <select value={doneFP} onChange={e=>setDoneFP(e.target.value)}
                      style={{fontSize:12,border:'1px solid #E2E8F0',borderRadius:8,padding:'5px 9px',background:'white',color:'#475569',cursor:'pointer'}}>
                      <option value="">All partners</option>
                      {partners.map(p=><option key={p.id}>{p.name}</option>)}
                    </select>
                  </div>
                </div>
                {/* Table header */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 140px 88px 1.3fr 84px 88px 88px 54px',gap:0,background:'#F8FAFC',borderBottom:'1px solid #F1F5F9',padding:'10px 16px'}}>
                  {['Partner','Category','Store ID','Memo','Assignee','Start','Resolved','Days'].map(h=>(
                    <span key={h} style={{fontSize:12,fontWeight:600,color:'#94A3B8'}}>{h}</span>
                  ))}
                </div>
                {(()=>{
                  const filtered2=done.filter(p=>(!doneFA||p.assignee===doneFA)&&(!doneFP||p.partner===doneFP));
                  if(!filtered2.length) return (
                    <div style={{textAlign:'center',padding:'32px 0',color:'#94A3B8',fontSize:13}}>No resolved projects</div>
                  );
                  return filtered2.map(p=>{
                    const cat=catBy(p.catId);
                    const days=p.start&&p.doneAt?Math.max(0,Math.round((new Date(p.doneAt)-new Date(p.start))/(86400000))):'–';
                    const isSel=selDone?.id===p.id;
                    return (
                      <React.Fragment key={p.id}>
                        <div onClick={()=>setSelDone(isSel?null:p)}
                          style={{display:'grid',gridTemplateColumns:'1fr 140px 88px 1.3fr 84px 88px 88px 54px',gap:0,
                            padding:'10px 16px',borderBottom:'1px solid #F8FAFC',cursor:'pointer',
                            background:isSel?'#EFF6FF':'white',transition:'background .15s',alignItems:'center'}}>
                          <span style={{fontSize:12,color:'#334155',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.partner}</span>
                          <span style={{minWidth:0,overflow:'hidden'}}>{cat?<span style={{fontSize:10,padding:'2px 7px',borderRadius:999,color:'white',background:cat.color,whiteSpace:'nowrap',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',display:'inline-block',verticalAlign:'middle'}}>{cat.name}</span>:'–'}</span>
                          <span style={{fontSize:12,color:'#475569',fontWeight:600}}>{storeMain(p)}</span>
                          <span style={{fontSize:12,color:'#94A3B8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.memo||'–'}</span>
                          <span style={{fontSize:12,color:'#334155'}}>{p.assignee}</span>
                          <span style={{fontSize:11,color:'#94A3B8'}}>{p.start||'–'}</span>
                          <span style={{fontSize:11,color:'#94A3B8'}}>{p.doneAt}</span>
                          <span style={{fontSize:11,color:'#3B82F6',fontWeight:600}}>{days!=='–'?`${days}d`:'–'}</span>
                        </div>
                        {isSel&&(
                          <div style={{background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',display:'flex',flexDirection:'column',height:340}}>
                            {/* Chat header */}
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid #E2E8F0',flexShrink:0,background:'white'}}>
                              <div style={{display:'flex',alignItems:'center',gap:10}}>
                                <span style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{storeMain(p)}</span>
                                <span style={{fontSize:11,color:'#94A3B8'}}>{p.partner} · {p.assignee}</span>
                                {cat&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:999,color:'white',background:cat.color}}>{cat.name}</span>}
                              </div>
                              <button onClick={e=>{e.stopPropagation();revertDone(p.id);}}
                                style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:8,
                                  border:'1px solid #F59E0B',background:'#FFFBEB',color:'#D97706',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                                <IcRefresh size={13}/>Reopen
                              </button>
                            </div>
                            {/* History list */}
                            <div ref={doneHistRef} style={{flex:1,overflowY:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
                              {!(selDone.hist||[]).length
                                ?<div style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1,color:'#CBD5E1',fontSize:12}}>No history</div>
                                :(selDone.hist||[]).map(h=>(
                                  <div key={h.id} style={{display:'flex',flexDirection:'column',alignItems:h.by==='Me'?'flex-end':'flex-start'}}>
                                    <div style={{fontSize:10,color:'#94A3B8',marginBottom:3}}>{h.by} · {h.at}</div>
                                    <div style={{maxWidth:'75%',padding:'8px 12px',borderRadius:h.by==='Me'?'12px 4px 12px 12px':'4px 12px 12px 12px',
                                      background:h.by==='Me'?'#3B82F6':'white',color:h.by==='Me'?'white':'#334155',
                                      fontSize:12,lineHeight:1.5,boxShadow:'0 1px 3px rgba(0,0,0,.08)',border:h.by==='Me'?'none':'1px solid #E2E8F0'}}>
                                      {h.text}
                                    </div>
                                  </div>
                                ))
                              }
                            </div>
                            {/* Message input */}
                            <div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:8,padding:'10px 16px',borderTop:'1px solid #E2E8F0',background:'white',flexShrink:0}}>
                              <input value={doneMsg} onChange={e=>setDoneMsg(e.target.value)}
                                onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&addDoneHist()}
                                placeholder="Add note..." style={{flex:1,border:'1px solid #E2E8F0',borderRadius:8,padding:'7px 11px',fontSize:12,outline:'none'}}/>
                              <button onClick={addDoneHist}
                                style={{padding:'7px 14px',borderRadius:8,background:'#3B82F6',color:'white',border:'none',fontSize:12,fontWeight:600,cursor:'pointer'}}>Send</button>
                            </div>
                          </div>
                        )}
                      </React.Fragment>
                    );
                  });
                })()}
              </div>
            </div>
          )}
        </main>
      </div>

      {/* ── Registration modal ────────────────────────────────────────────── */}
      {modal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9998,padding:16}}>
          <div style={{background:'white',borderRadius:20,boxShadow:'0 24px 64px rgba(0,0,0,.2)',width:'100%',maxWidth:460,maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 24px',borderBottom:'1px solid #F1F5F9',flexShrink:0}}>
              <span style={{fontSize:18,fontWeight:700,color:'#0F172A'}}>New Request</span>
              <button onClick={()=>setModal(false)} style={{padding:6,borderRadius:8,border:'none',background:'none',cursor:'pointer',color:'#94A3B8',display:'flex'}}><IcX size={18}/></button>
            </div>
            <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:14,overflowY:'auto'}}>

              {/* Assignee */}
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#475569',marginBottom:7,letterSpacing:.3}}>Assignee <span style={{color:'#EF4444'}}>*</span></label>
                <select value={form.assignee} onChange={e=>setForm(v=>({...v,assignee:e.target.value}))}
                  style={{width:'100%',border:`1px solid ${!form.assignee?'#FCA5A5':'#E2E8F0'}`,borderRadius:10,padding:'11px 13px',fontSize:14,background:'white'}}>
                  <option value="">Select</option>
                  {assignees.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
                </select>
              </div>

              {/* Start date */}
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#475569',marginBottom:7,letterSpacing:.3}}>Start date <span style={{color:'#EF4444'}}>*</span></label>
                <input type="date" value={form.start} onChange={e=>setForm(v=>({...v,start:e.target.value}))}
                  style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:10,padding:'11px 13px',fontSize:14}}/>
              </div>

              {/* Partner */}
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#475569',marginBottom:7,letterSpacing:.3}}>Partner <span style={{color:'#EF4444'}}>*</span></label>
                <select value={form.partner} onChange={e=>setForm(v=>({...v,partner:e.target.value}))}
                  style={{width:'100%',border:`1px solid ${!form.partner?'#FCA5A5':'#E2E8F0'}`,borderRadius:10,padding:'11px 13px',fontSize:14,background:'white'}}>
                  <option value="">Select</option>
                  {partners.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
                </select>
              </div>

              {/* Category */}
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#475569',marginBottom:7,letterSpacing:.3}}>Category <span style={{color:'#EF4444'}}>*</span></label>
                <select value={form.catId} onChange={e=>setForm(v=>({...v,catId:Number(e.target.value)}))}
                  style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:10,padding:'11px 13px',fontSize:14,background:'white'}}>
                  {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>

              {/* Store ID */}
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#475569',marginBottom:7,letterSpacing:.3}}>Store ID <span style={{color:'#EF4444'}}>*</span> <span style={{color:'#94A3B8',fontWeight:400}}>(separate multiple with commas)</span></label>
                <textarea value={form.storeId} onChange={e=>setForm(v=>({...v,storeId:e.target.value}))}
                  placeholder="e.g. 44556, 3421, 33456, 11235" rows={2}
                  style={{width:'100%',border:`1px solid ${!form.storeId.trim()?'#FCA5A5':'#E2E8F0'}`,borderRadius:10,padding:'11px 13px',fontSize:14,resize:'vertical',fontFamily:'inherit'}}/>
                {(()=>{const n=form.storeId.split(',').map(s=>s.trim()).filter(Boolean).length;return n>1?<div style={{marginTop:6,fontSize:11,color:'#3B82F6',fontWeight:600}}>{n} stores entered · registered as 1 project</div>:null;})()}
              </div>

              {/* Memo */}
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:700,color:'#475569',marginBottom:7,letterSpacing:.3}}>Memo <span style={{color:'#94A3B8',fontWeight:400}}>(optional)</span></label>
                <textarea value={form.memo} onChange={e=>setForm(v=>({...v,memo:e.target.value}))}
                  placeholder="Enter a memo" rows={2}
                  style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:10,padding:'11px 13px',fontSize:14,resize:'vertical',fontFamily:'inherit'}}/>
              </div>

            </div>
            <div style={{padding:'0 24px 24px',display:'flex',gap:12,flexShrink:0}}>
              <button onClick={()=>setModal(false)} style={{flex:1,padding:'13px 0',border:'1px solid #E2E8F0',borderRadius:12,fontSize:14,fontWeight:600,color:'#64748B',background:'white',cursor:'pointer'}}>Cancel</button>
              {(()=>{const ok=form.storeId.trim()&&form.partner&&form.assignee&&form.start;return(
                <button onClick={addProj} disabled={!ok} style={{
                  flex:1,padding:'13px 0',border:'none',borderRadius:12,fontSize:14,fontWeight:700,color:'white',
                  cursor:ok?'pointer':'not-allowed',
                  background:ok?'#3B82F6':'#93C5FD',
                  boxShadow:ok?'0 4px 14px -2px rgba(59,130,246,.45)':'none'
                }}>Register</button>
              );})()}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
